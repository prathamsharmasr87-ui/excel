 <!DOCTYPE html>
 <html lang="en">
 <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=<device-width>, initial-scale=1.0">
    <title>Document</title>
 </head>
 <body>
    <script>
        let num=1;
        while(num <= 10) {
            document.write(`${num}<br>`);
            num++;
        }
         let num1=1;
        do {
            document.write(`${num1} br`);
            num1++; 
        }while (num1 <=20);
        for (let i=1; i<+10; i++){
            document.write(`${i}<br>`);
        }
            
    </script>
 </body>
 </html>
